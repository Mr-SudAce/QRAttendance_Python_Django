<div class="card border p-0 m-0">
    <div class="card-header text-white py-3" style="background-color: var(--color-primary); border-bottom: none;">
        <div class="d-flex justify-content-between align-items-center">
            <h6 class="mb-0 fw-bold">
                {% if course %} Update {% else %} Create New {% endif %} Course
            </h6>
            <a href="{% url 'assign_teacher' %}" class="btn btn-sm btn-light fw-medium px-3 m-0"
               style="color: var(--color-primary); font-size: 0.8rem; border-radius: 4px;">
                Assign Teacher Instead
            </a>
        </div>
    </div>
    
    <div class="card-body">
        <form method="post" action="{% if course %}{% url 'course_edit' course.id %}{% else %}{% url 'add_course' %}{% endif %}">
            {% csrf_token %}
            
            <div class="row g-3">
                <div class="col-md-7">
                    <label class="form-label small fw-bold text-secondary">Course Name</label>
                    <input type="text" class="form-control" name="course_name"
                           value="{{ course.name|default:'' }}"
                           placeholder="e.g. Software Engineering" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label small fw-bold text-secondary">Course Code</label>
                    <input type="text" class="form-control" name="course_code"
                           value="{{ course.code|default:'' }}"
                           placeholder="ABC-XXX" required>
                </div>
            </div>
            
            <div class="mt-3">
                <label class="form-label small fw-bold text-secondary">Department</label>
                <select class="form-select" name="course_department" required>
                    <option value selected disabled>Select Department</option>
                    {% for department in departments %}
                    <option value="{{ department.id }}" {% if course.department.id == department.id %}selected{% endif %}>
                        {{ department.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mt-3">
                <label class="form-label small fw-bold text-secondary">Description (Optional)</label>
                <textarea class="form-control" name="course_description" rows="3" 
                          placeholder="Provide a brief course overview...">{{ course.description|default:'' }}</textarea>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn" style="width: 100%; background: var(--color-primary); color: white; padding: 0.8rem; font-weight: 600;">
                    {% if course %} Update Custom {% else %} Register New {% endif %} Course
                </button>
            </div>
        </form>
    </div>
</div>
