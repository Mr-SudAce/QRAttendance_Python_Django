{% extends 'base.html' %}

{% block main_title %}Error{% endblock %}

{% block main_content %}
<div class="row mt-5">
    <div class="col-lg-6 mx-auto">
        <div class="card border-0 text-center p-5" style="background: linear-gradient(135deg, #f8fafc 0%, #e5e7eb 100%);">
            <div style="font-size: 5rem; color: var(--color-danger); margin-bottom: 1.5rem;">
                <i class="bi bi-exclamation-triangle"></i>
            </div>
            <h1 class="fw-bold mb-2" style="color: var(--color-danger);">
                Error {{error}}
            </h1>
            <p class="text-muted mb-4" style="font-size: 1.1rem;">
                Something went wrong. Please try again or contact support.
            </p>
            <a href="{% url 'home' %}" class="btn btn-primary btn-lg fw-bold">
                <i class="bi bi-house-door me-2"></i> Go to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
