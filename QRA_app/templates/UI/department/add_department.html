<div class="card border p-0 m-0">
    <div class="card-header text-white py-3" style="background-color: var(--color-primary); border-bottom: none;">
        <div class="d-flex justify-content-between align-items-center py-2">
            <h6 class="mb-0 fw-bold">
                {% if dept %} Update {% else %} Create New {% endif %}
                Department
            </h6>
        </div>
    </div>
    <div class="card-body">
        <form method="post"
            action="{% if dept %}{% url 'department_edit' dept.id %}{% else %}{% url 'add_department' %}{% endif %}">
            {% csrf_token %}

            <div style="margin-bottom: 1.25rem;">
                <label
                    style="display: block; margin-bottom: 0.5rem; color: var(--color-secondary); font-weight: 500; font-size: 0.9rem;">
                    Department Name:
                </label>

                <input type="text"
                    name="department_name"
                    required
                    value="{{ dept.name|default:'' }}"
                    placeholder="e.g. Computer Science"
                    style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius); outline: none;">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label
                    style="display: block; margin-bottom: 0.5rem; color: var(--color-secondary); font-weight: 500; font-size: 0.9rem;">
                    Department Description:
                </label>

                <textarea
                    name="department_description"
                    placeholder="Optional description of the department"
                    style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius); outline: none; min-height: 100px;">{{ dept.description|default:'' }}</textarea>
            </div>

            <button type="submit" class="btn"
                style="width: 100%; background: var(--color-primary); color: white; padding: 0.8rem; font-weight: 600;">
                {% if dept %} Update {% else %} Add {% endif %}Department
            </button>
        </form>
    </div>

</div>
