<div class="card border p-3 m-0">
    <div class="d-flex justify-content-between">
        <h3 class="m-0 align-content-center fw-bold"
            style="color: var(--text-dark); font-size: 1.25rem; font-weight: 600;">
            Registered Departments
        </h3>
        <form method="get" id="searchForm" class="mb-0">
            <div class="input-group input-group-sm" style="width: 200px;">
                <span class="input-group-text bg-white border-end-0 text-muted">
                    <i class="bi bi-search"></i>
                </span>
                <input
                    type="search"
                    name="q"
                    id="searchInput"
                    value="{{ query|default:'' }}"
                    class="form-control border-start-0 p-2"
                    placeholder="Search...">
            </div>
        </form>
    </div>

    <div id="deptTableContainer" class="mt-3">
        {% include 'UI/department/department_list_content.html' %}
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const input = document.getElementById("searchInput");
    const container = document.getElementById("deptTableContainer");
    let timeout = null;
    input.addEventListener("input", function () {
        clearTimeout(timeout);

        timeout = setTimeout(() => {
            fetch(`/department/search-ajax/?q=` + encodeURIComponent(input.value))
                .then(res => {
                    if (!res.ok) throw new Error('Network response error');
                    return res.text();
                })
                .then(html => {
                    container.innerHTML = html;
                })
                .catch(err => console.error("Search failed:", err))
                .finally(() => {
                    document.body.style.cursor = 'default';
                });
        }, 300);
    });
});
</script>
